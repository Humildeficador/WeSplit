services:
  api:
    container_name: wesplit-api
    build:
      context: .
      dockerfile: Dockerfile
    image: wesplit-backend:latest
    ports:
      - "3333:3333"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - generated:/app/generated
    environment:
      NODE_ENV: development

volumes:
  node_modules:
  generated: