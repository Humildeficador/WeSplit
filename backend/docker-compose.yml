services:
  api:
    container_name: wesplit-api
    build:
      context: .
      dockerfile: Dockerfile
    image: wesplit-backend:latest
    ports:
      - "3333:3333"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - generated:/app/generated
      - sqlite_data:/prisma_data
    environment:
      NODE_ENV: development
      DATABASE_URL: "file:/prisma_data/dev.db"
    command: sh -c "npx prisma migrate dev && npm run dev"

volumes:
  node_modules:
  generated:
  sqlite_data:
